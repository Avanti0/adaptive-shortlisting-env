spec_version: 1
name: adaptive-shortlisting-env
type: space
runtime: fastapi
app: app:app
port: 7860
description: RL environment for sequential candidate shortlisting using structured feedback
version: 0.1.0

# Models for OpenEnv Compliance
action_model: models:ShortlistingAction
observation_model: models:ShortlistingObservation

# API Endpoints for OpenEnv Compliance
api:
  reset: /reset
  step: /step
  state: /state

# Environment Configuration
entrypoint: env.shortlisting_env:ShortlistingEnv
inference:
  script: inference.py

# Task Definitions
tasks:
  - name: easy
    description: "Shortlist from a small pool of 100 candidates."
    difficulty: easy
  - name: medium
    description: "Shortlist from a medium pool of 1,000 candidates."
    difficulty: medium
  - name: hard
    description: "Shortlist from the full pool of over 12,000 candidates."
    difficulty: hard

# Environment Variables
environment:
  variables:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
